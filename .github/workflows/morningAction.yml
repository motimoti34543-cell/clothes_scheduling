name: Send Daily Outfit Notification

on:
  schedule:
    # 毎日日本時間 6:00 (UTC 21:00 前日) に実行
    - cron: '0 21 * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # プロジェクトのPythonバージョンに合わせて調整してください

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run notification script
      run: python send_daily_outfit.py
      env:
        WEATHER_CITY: ${{ secrets.WEATHER_CITY }}
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add history.json
        # 変更がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update wardrobe history" && git push)
